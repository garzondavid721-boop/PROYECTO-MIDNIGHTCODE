name: CI + SonarQube Analysis

on:
  push:
    branches: 
      - main
      - feature
  pull_request:

jobs:
  test-and-sonar:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout del repositorio
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4️⃣ Ejecutar tests con Jest
      # Si falla, el job termina y SonarQube no se ejecuta
      - name: Run tests with Jest
        run: npm run test -- --coverage

      # 5️⃣ SonarQube Scan
      # Solo se ejecuta si los tests pasaron
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://0jcvb7vx-9000.use2.devtunnels.ms/